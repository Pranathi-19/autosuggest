<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Toggle</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>

    <div class="navbar">
        <a href="/">Home</a>
        <a href="/pages/card.html">Card</a>
        <a href="#" onclick="toggleProfile()">Toggle</a>
        <a href="">Random</a>
    </div>

    <div class="card">
        <img id="profileImage" src="../images/john.png" alt="user image">
        <h2 id="profileName">John Doe</h2>
        <p id="profileGender">Male</p>
    </div>

    <script>
        let isJohn = true;

        function toggleProfile() {
            const image = document.getElementById("profileImage");
            const name = document.getElementById("profileName");
            const gender = document.getElementById("profileGender");

            if (isJohn) {
                image.src = "../images/zoe.png";
                name.textContent = "Zoe Clark";
                gender.textContent = "Female";
            } else {
                image.src = "../images/john.png";
                name.textContent = "John Doe";
                gender.textContent = "Male";
            }

            isJohn = !isJohn;
        }
    </script>

</body>
</html>
